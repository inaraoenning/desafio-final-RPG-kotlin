<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Arena - Chat & Batalha</title>

    <!--
        SockJS: biblioteca JS que cria a conexão WebSocket.
        Tenta WebSocket real primeiro; se o navegador não suportar,
        usa HTTP long-polling como fallback automático.
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>

    <!--
        STOMP.js: protocolo de mensagens em cima do WebSocket.
        Permite enviar para "/app/..." e assinar "/topic/..."
        da mesma forma que configuramos no WebSocketConfig.kt
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { text-align: center; color: #e94560; margin-bottom: 20px; font-size: 28px; }
        h2 { color: #e94560; margin-bottom: 12px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .card {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #0f3460;
        }

        /* ── CONEXÃO ── */
        #login-area { grid-column: 1 / -1; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input[type="text"], input[type="number"] {
            background: #0f3460;
            border: 1px solid #e94560;
            color: #eee;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
            min-width: 120px;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
            white-space: nowrap;
        }
        button:hover { background: #c73652; }
        button:disabled { background: #555; cursor: not-allowed; }
        #status { font-size: 13px; color: #aaa; padding: 8px 0; }
        #status.conectado { color: #4caf50; font-weight: bold; }

        /* ── CHAT ── */
        #chat-messages {
            height: 260px;
            overflow-y: auto;
            background: #0d1b2a;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 13px;
            line-height: 1.6;
        }
        .msg-chat   { color: #eee; }
        .msg-entrar { color: #4caf50; font-style: italic; }
        .msg-sair   { color: #f44336; font-style: italic; }
        .msg-nome   { font-weight: bold; color: #e94560; }

        .chat-input { display: flex; gap: 8px; }
        .chat-input input { flex: 1; }

        /* ── BATALHA ── */
        .batalha-form { display: flex; flex-direction: column; gap: 8px; }
        .batalha-form label { font-size: 12px; color: #aaa; }
        .row { display: flex; gap: 8px; }
        .row input { flex: 1; }
        select {
            background: #0f3460;
            border: 1px solid #e94560;
            color: #eee;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            flex: 1;
        }

        #batalha-resultado {
            margin-top: 14px;
            background: #0d1b2a;
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            min-height: 60px;
        }
        .hp-bar-wrap { margin: 6px 0; }
        .hp-label { font-size: 12px; color: #aaa; margin-bottom: 3px; }
        .hp-bar { height: 14px; background: #0f3460; border-radius: 4px; overflow: hidden; }
        .hp-fill { height: 100%; background: #4caf50; transition: width 0.4s; }
        .hp-fill.baixo { background: #f44336; }
        .vitoria { color: #ffd700; font-size: 18px; font-weight: bold; text-align: center; margin-top: 8px; }

        #log-batalha {
            white-space: pre-wrap;
            font-size: 12px;
            color: #aaa;
            max-height: 120px;
            overflow-y: auto;
            background: #0d1b2a;
            padding: 8px;
            border-radius: 6px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<h1>⚔️ RPG Arena</h1>

<div class="container">

    <!-- ── LOGIN / CONEXÃO ── -->
    <div class="card" id="login-area">
        <input type="text" id="username" placeholder="Seu nome de guerreiro" />
        <button id="btn-conectar" onclick="conectar()">Conectar ao Chat</button>
        <span id="status">Desconectado</span>
    </div>

    <!-- ── CHAT ── -->
    <div class="card">
        <h2>💬 Chat da Arena</h2>
        <div id="chat-messages"></div>
        <div class="chat-input">
            <input type="text" id="chat-input" placeholder="Digite sua mensagem..."
                   onkeypress="if(event.key==='Enter') enviarMensagem()" disabled />
            <button id="btn-enviar" onclick="enviarMensagem()" disabled>Enviar</button>
        </div>
    </div>

    <!-- ── BATALHA ── -->
    <div class="card">
        <h2>🗡️ Batalha</h2>
        <div class="batalha-form">

            <label>Iniciar batalha entre dois personagens (IDs do banco):</label>
            <div class="row">
                <input type="number" id="id-p1" placeholder="ID Personagem 1" />
                <input type="number" id="id-p2" placeholder="ID Personagem 2" />
                <button onclick="iniciarBatalha()">Iniciar</button>
            </div>

            <label>Executar round (ID da batalha + ações):</label>
            <div class="row">
                <input type="number" id="id-batalha" placeholder="ID Batalha" />
                <select id="acao-p1">
                    <option value="ATACAR">P1: Atacar</option>
                    <option value="DEFENDER">P1: Defender</option>
                    <option value="PODER">P1: Poder</option>
                </select>
                <select id="acao-p2">
                    <option value="ATACAR">P2: Atacar</option>
                    <option value="DEFENDER">P2: Defender</option>
                    <option value="PODER">P2: Poder</option>
                </select>
                <button onclick="executarRound()">Round!</button>
            </div>

            <button onclick="consultarBatalha()" style="background:#0f3460; border:1px solid #e94560">
                🔍 Consultar Estado
            </button>
        </div>

        <div id="batalha-resultado">Nenhuma batalha iniciada ainda.</div>
        <div id="log-batalha" style="display:none"></div>
    </div>

</div><!-- /container -->

<script>
    // ─────────────────────────────────────────────────────────────────────────────
    // VARIÁVEIS GLOBAIS
    // ─────────────────────────────────────────────────────────────────────────────
    let stompClient = null;  // referência para o cliente STOMP (WebSocket)
    let username = "";       // nome do jogador atual

    // ─────────────────────────────────────────────────────────────────────────────
    // WEBSOCKET — CONEXÃO
    // ─────────────────────────────────────────────────────────────────────────────
    function conectar() {
        username = document.getElementById("username").value.trim();
        if (!username) { alert("Digite seu nome!"); return; }

        // 1. Cria a conexão SockJS apontando para o endpoint que definimos no
        //    WebSocketConfig.kt (registerStompEndpoints → "/chat-websocket")
        const socket = new SockJS('/chat-websocket');

        // 2. Cria o cliente STOMP em cima da conexão SockJS
        stompClient = Stomp.over(socket);
        stompClient.debug = null; // desativa logs de debug no console

        // 3. Conecta ao servidor. O segundo parâmetro {} são os headers (não precisamos aqui).
        //    O terceiro parâmetro é a função chamada quando a conexão for bem-sucedida.
        stompClient.connect({}, function (frame) {
            document.getElementById("status").textContent = "✅ Conectado como: " + username;
            document.getElementById("status").className = "conectado";
            document.getElementById("btn-conectar").disabled = true;
            document.getElementById("chat-input").disabled = false;
            document.getElementById("btn-enviar").disabled = false;

            // 4. Assina o canal "/topic/mensagens"
            //    Toda vez que alguém publicar nesse canal (via @SendTo no ChatController),
            //    a função abaixo é chamada com a mensagem recebida.
            stompClient.subscribe('/topic/mensagens', function (mensagem) {
                const dados = JSON.parse(mensagem.body); // desserializa o JSON
                exibirMensagem(dados);
            });

            // 5. Envia mensagem de "entrar" para o servidor.
            //    Vai para "/app/chat.entrar" → processado pelo método adicionarUsuario()
            //    no ChatController.kt, que retorna para "/topic/mensagens".
            stompClient.send("/app/chat.entrar", {}, JSON.stringify({
                remetente: username,
                conteudo: "",
                tipo: "ENTRAR"
            }));
        });
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // WEBSOCKET — ENVIAR MENSAGEM DE CHAT
    // ─────────────────────────────────────────────────────────────────────────────
    function enviarMensagem() {
        const input = document.getElementById("chat-input");
        const texto = input.value.trim();
        if (!texto || !stompClient) return;

        // Envia para "/app/chat.enviar" → processado pelo método enviarMensagem()
        // no ChatController.kt, que publica em "/topic/mensagens" para todos.
        stompClient.send("/app/chat.enviar", {}, JSON.stringify({
            remetente: username,
            conteudo: texto,
            tipo: "CHAT"
        }));

        input.value = "";
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // WEBSOCKET — EXIBIR MENSAGEM NA TELA
    // ─────────────────────────────────────────────────────────────────────────────
    function exibirMensagem(msg) {
        const container = document.getElementById("chat-messages");
        const div = document.createElement("div");

        if (msg.tipo === "ENTRAR" || msg.tipo === "SAIR") {
            div.className = "msg-" + msg.tipo.toLowerCase();
            div.textContent = msg.conteudo;
        } else {
            div.className = "msg-chat";
            div.innerHTML = `<span class="msg-nome">${msg.remetente}:</span> ${msg.conteudo}`;
        }

        container.appendChild(div);
        container.scrollTop = container.scrollHeight; // auto-scroll para o final
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // REST — BATALHA
    // Estas funções usam fetch() normal (HTTP) para chamar os endpoints do
    // BatalhaController.kt. Não são WebSocket — são requisições REST comuns.
    // ─────────────────────────────────────────────────────────────────────────────

    // POST /batalha/iniciar
    async function iniciarBatalha() {
        const id1 = document.getElementById("id-p1").value;
        const id2 = document.getElementById("id-p2").value;
        if (!id1 || !id2) { alert("Preencha os dois IDs!"); return; }

        const res = await fetch('/batalha/iniciar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idPersonagem1: Number(id1), idPersonagem2: Number(id2) })
        });
        const data = await res.json();
        document.getElementById("id-batalha").value = data.id;
        atualizarPlacar(data);

        // Avisa no chat que uma batalha começou
        if (stompClient) {
            stompClient.send("/app/chat.enviar", {}, JSON.stringify({
                remetente: "🔔 Sistema",
                conteudo: `Nova batalha iniciada! ID: ${data.id} — ${data.personagem1?.nome ?? '?'} vs ${data.personagem2?.nome ?? '?'}`,
                tipo: "CHAT"
            }));
        }
    }

    // POST /batalha/{id}/round
    async function executarRound() {
        const id = document.getElementById("id-batalha").value;
        if (!id) { alert("Informe o ID da batalha!"); return; }
        const acaoP1 = document.getElementById("acao-p1").value;
        const acaoP2 = document.getElementById("acao-p2").value;

        const res = await fetch(`/batalha/${id}/round`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ acaoPersonagem1: acaoP1, acaoPersonagem2: acaoP2 })
        });
        const data = await res.json();
        atualizarPlacar(data);
    }

    // GET /batalha/{id}
    async function consultarBatalha() {
        const id = document.getElementById("id-batalha").value;
        if (!id) { alert("Informe o ID da batalha!"); return; }

        const res = await fetch(`/batalha/${id}`);
        const data = await res.json();
        atualizarPlacar(data);
    }

    // ─────────────────────────────────────────────────────────────────────────────
    // UI — ATUALIZAR PLACAR DA BATALHA
    // ─────────────────────────────────────────────────────────────────────────────
    function atualizarPlacar(data) {
        const el = document.getElementById("batalha-resultado");
        const logEl = document.getElementById("log-batalha");

        const p1 = data.personagem1;
        const p2 = data.personagem2;

        // HP máximo estimado em 100 para a barra (ajuste se tiver o valor real)
        const maxHp = 100;

        // Calcula a % da barra — evita passar de 100%
        const pct1 = Math.min(100, Math.max(0, (p1.vida / maxHp) * 100));
        const pct2 = Math.min(100, Math.max(0, (p2.vida / maxHp) * 100));

        let html = `
            <strong>${p1?.nome ?? '?'}</strong>
            <div class="hp-bar-wrap">
                <div class="hp-label">HP: ${p1.vida}</div>
                <div class="hp-bar"><div class="hp-fill ${pct1 < 30 ? 'baixo' : ''}" style="width:${pct1}%"></div></div>
            </div>
            <strong>${p2?.nome ?? '?'}</strong>
            <div class="hp-bar-wrap">
                <div class="hp-label">HP: ${p2.vida}</div>
                <div class="hp-bar"><div class="hp-fill ${pct2 < 30 ? 'baixo' : ''}" style="width:${pct2}%"></div></div>
            </div>
        `;

        if (data.encerrada) {
            html += `<div class="vitoria">🏆 VITÓRIA: ${data.vencedor}!</div>`;

            // Avisa no chat que a batalha terminou
            if (stompClient) {
                stompClient.send("/app/chat.enviar", {}, JSON.stringify({
                    remetente: "🔔 Sistema",
                    conteudo: `⚔️ BATALHA ENCERRADA! Vencedor: ${data.vencedor} 🏆`,
                    tipo: "CHAT"
                }));
            }
        }

        el.innerHTML = html;

        // Exibe o log da batalha
        if (data.log || data.logDescritivo) {
            logEl.style.display = "block";
            logEl.textContent = data.log || data.logDescritivo;
            logEl.scrollTop = logEl.scrollHeight;
        }
    }
</script>
</body>
</html>
